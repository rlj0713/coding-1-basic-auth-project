{% extends "base.html" %}

{% block content %}

<h2>Your Dashboard</h2>

<h3>Welcome, {{ username }}!</h3>

<!-- TODO: Add a button or link to create a new entry -->
<a href="/create" class="link">Create New Entry</a>

<a href="/logout" ><button>Logout</button></a>

<br><br>

{% for entry in entries %}
    <div>
        <h3>{{ entry['title'] }}</h3>
        <p>{{ entry['content'] }}</p>
            {% if entry['image'] %}
                <img src="{{ url_for('get_image', id=entry['id']) }}" alt="Entry Image" style="max-width: 200px; max-height: 200px;">
            {% endif %}

        <a href="/edit/{{ entry['id'] }}" class="link">Edit</a>
        <a href="/delete/{{ entry['id'] }}" class="link">Delete</a>

    </div>
    <hr>
{% endfor %}

<br>

<a href="/logout"><button>Logout</button></a>

{% endblock %}
